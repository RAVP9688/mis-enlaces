
<html>
<head>
<title>Mis enlaces</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Poppins', sans-serif;
    text-align: center;
    background: linear-gradient(to right, #4facfe, #00f2fe);
}

h1 {
    color: white;
    font-size: 26px;
}

.card {
    margin: 40px;
}

a {
    display: inline-block;
    padding: 30px 80px;
    background: white;
    color: black;
    text-decoration: none;
    border-radius: 50px;
    font-weight: bold;
    font-size: 26px;
}

a:hover {
    background: #ddd;
}
.hero {
    position: relative;
}

.hero::after {
    content: "Acepta el llamado";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.1));
}
.hero {
    height: 75vh;              /* ajuste de imagen en pantalla */
    width: 100%;               /* ancho completo */
    background-image: url("images.jpeg");
    background-size: 90%;    /* ajusta sin deformar */
    background-position: center top; /* CENTRA la imagen */
    background-repeat: no-repeat;

    box-shadow: 0px 10px 25px rgba(0,0,0,0.6);
    transition: height 1.2s ease, transform 1.2s ease;
    transform: translateY(0);
}
.hero.small {
    height: 25vh;
    transform: translateY(-10px);
}
</style>
</head>
<body>
<div class="hero"></div>
<h1>Mis enlaces importantes</h1>
<div class="card">
  <a href="https://drive.google.com/file/d/1m5uZlpra_RXzbgG7iGXhBq4HHjJWkQSu/view?usp=drive_link">📄 Abrir Drive</a><br><br>
</div>
<div class="card">
  <a href="https://wa.me/527821454273">📱 Abrir WhatsApp</a><br><br>
</div>
<div class="card">
   <a href="https://maps.app.goo.gl/sAm1NgvGALoHbCBd8">📍 Ver ubicacion</a>
</div>
<script>
window.addEventListener("load", function () {
    setTimeout(function () {
        document.querySelector(".hero").classList.add("small");
    }, 300);
});
</script>
</body>
</html>
