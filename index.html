
<html>
<head>
<title>Mis enlaces</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body {
    font-family: 'Poppins', sans-serif;
    text-align: center;
    background: linear-gradient(to right, #4facfe, #00f2fe);
}

h1 {
    color: white;
    font-size: 26px;
}

.card {
    margin: 40px;
}

a {
    display: inline-block;
    padding: 30px 80px;
    background: white;
    color: black;
    text-decoration: none;
    border-radius: 50px;
    font-weight: bold;
    font-size: 26px;
}

a:hover {
    background: #ddd;
}
.hero {
    position: relative;
}
.hero {
    height: 75vh;              /* ajuste de imagen en pantalla */
    width: 100%;               /* ancho completo */
    background-image: url("images.jpeg");
    background-size: 90%;    /* ajusta sin deformar */
    background-position: center top; /* CENTRA la imagen */
    background-repeat: no-repeat;
    transition: height 1.2s ease, transform 1.2s ease;
    transform: translateY(0);
      box-shadow: 0px 10px 25px rgba(0,0,0,0.1);
   
}
.hero.small {
    height: 25vh;
    transform: translateY(-10px);
}
.btn { /* Modificaciones de etiqueta whatsapp */
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 30px;

    
    padding: 20px;
    width: 80px; /* pequeño al inicio */
    height: 80px;
    color: green;
    text-decoration: none;
    border-radius: 50px;
    font-size: 30px;
    font-weight: bold;

    background-size: 75%;
    background-position: left center;
    background-repeat: no-repeat;
    position: relative;
    overflow: hidden;
    transition: all 0.4s ease;
    
    box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
}
    .btn i {
    font-size: 30px;
    z-index: 2;
}
    .btn span {
    opacity: 0;
    white-space: nowrap;
    transition: opacity 0.3s ease;
    z-index: 2;
}
    
    .btn {
    position: relative;
}
.btn:hover {
    width: 220px; /* se expande */
    justify-content: flex-start;
    padding-left: 20px;
}

.btn:hover span {
    opacity: 1; /* aparece texto */
}
.btn::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.4);
    border-radius: 50px;
}

.btn i, .btn {
    position: relative;
    z-index: 1;
}
.whatsapp {
    background-image: url("69a01057-5c9f-4a3a-aafe-a0a3df483406.png");
    background-position: 25% center; /* enfoca la parte importante */
}
</style>
</head>
<body>
<div class="hero"></div>
<h1>Mis enlaces importantes</h1>
<div class="card">
  <a href="https://drive.google.com/file/d/1m5uZlpra_RXzbgG7iGXhBq4HHjJWkQSu/view?usp=drive_link">📄 Abrir Drive</a><br><br>
</div>
<div class="card">
   <a href="https://maps.app.goo.gl/yKpT34iGXFDu55bh6">📍 Ubicación</a>
</div>
<div class="card">
   <a href="https://wa.me/527821454273" class="btn whatsapp">
  <i class="fab fa-whatsapp"></i>
       <span>WhatsApp</span>
</a>
</div>
<script>
window.addEventListener("load", function () {
    setTimeout(function () {
        document.querySelector(".hero").classList.add("small");
    }, 300);
});
</script>
</body>
</html>
